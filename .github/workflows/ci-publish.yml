name: CI & Publish

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: write

jobs:
  ci-publish:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.11.0"

      - name: 使用 Node.js ${{ matrix.node-version }} 版本
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Update npm
        run: npm install -g npm@latest

      - name: 安装依赖
        run: pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: 迭代版本号
        run: node ./.node/iteration-version.js -m ${{ vars.MAJOR_VN }} -n ${{ vars.MINOR_VN }}

      - name: 更新 marketplace.json
        run: node ./.node/update-marketplace.js

      - name: 发布前移除依赖字段
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkgsDir = './packages';
            for (const dir of fs.readdirSync(pkgsDir)) {
              const pkgPath = path.join(pkgsDir, dir, 'package.json');
              if (!fs.existsSync(pkgPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              if (pkg.private) continue;
              fs.copyFileSync(pkgPath, pkgPath + '.bak');
              delete pkg.dependencies;
              delete pkg.devDependencies;
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            }
          "

      - name: 发布插件到 npm
        run: pnpm publish -r --access public --no-git-checks

      - name: 发布后还原 package.json
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkgsDir = './packages';
            for (const dir of fs.readdirSync(pkgsDir)) {
              const bak = path.join(pkgsDir, dir, 'package.json.bak');
              if (!fs.existsSync(bak)) continue;
              fs.renameSync(bak, bak.replace('.bak', ''));
            }
          "

      - name: 提交版本号变更
        id: version_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/*/package.json packages/*/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: 迭代版本号 v${VERSION}"
          git push
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version_commit.outputs.VERSION }}
          release_name: Release v${{ steps.version_commit.outputs.VERSION }}
          commitish: ${{ steps.version_commit.outputs.sha }}
          draft: false
          prerelease: false
